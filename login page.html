
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2V Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

.title-container{
    margin-bottom:35px;
}

.v2v-title{
    font-family:'Orbitron',sans-serif;
    font-size:48px;
    font-weight:900;
    letter-spacing:4px;

    background:linear-gradient(
        90deg,
        #ffffff,
        #00c3ff,
        #7b2cff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
        0 0 10px rgba(0,195,255,.5),
        0 0 20px rgba(123,44,255,.5);

    animation:titleGlow 3s infinite alternate;
}

.v2v-title span{
    color:white;
}

.subtitle{
    color:rgba(255,255,255,.8);
    margin-top:10px;
    letter-spacing:2px;
    font-size:14px;
    text-transform:uppercase;
}

@keyframes titleGlow{
    from{
        filter:brightness(1);
    }
    to{
        filter:brightness(1.5);
    }
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        #190061,
        #240090,
        #4e00ff,
        #00b7ff
    );
    
}
body::before{
    content:'';
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at 20% 30%, rgba(123,44,255,.4), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,195,255,.4), transparent 40%);

    animation:bgMove 8s ease-in-out infinite alternate;
}

@keyframes bgMove{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.2);
    }
}

/* Animated Cubes Background */

.bg-cube{
    position:absolute;
    width:80px;
    height:80px;
    border:2px solid rgba(255,255,255,0.15);
    transform:rotate(45deg);
    animation:float 8s infinite ease-in-out;
}

.bg-cube:nth-child(1){
    top:10%;
    left:10%;
}
.bg-cube:nth-child(2){
    top:70%;
    left:15%;
}
.bg-cube:nth-child(3){
    top:20%;
    right:15%;
}
.bg-cube:nth-child(4){
    bottom:10%;
    right:10%;
}

@keyframes float{
    50%{
        transform:rotate(45deg) translateY(-20px);
    }
}

/* Main Container */

.container{
    width:1000px;
    max-width:90%;
    display:flex;
    border-radius:25px;
    overflow:hidden;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* Left Section */

.left{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Cube Ladder */

.ladder{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.step{
    width:70px;
    height:70px;
    background:linear-gradient(
        135deg,
        #7b2cff,
        #00c3ff
    );

    transform-style:preserve-3d;

    animation:
        cubeRotate 5s linear infinite,
        cubeFloat 3s ease-in-out infinite;

    box-shadow:
        0 0 20px rgba(0,195,255,0.5),
        0 0 40px rgba(123,44,255,0.3);
}

.step:nth-child(2){
    margin-left:40px;
    animation-delay:.5s;
}

.step:nth-child(3){
    margin-left:80px;
    animation-delay:1s;
}

.step:nth-child(4){
    margin-left:120px;
    animation-delay:1.5s;
}

.step:nth-child(5){
    margin-left:160px;
    animation-delay:2s;
}

@keyframes cubeRotate{
    from{
        transform:rotateX(0deg) rotateY(0deg) rotateZ(45deg);
    }
    to{
        transform:rotateX(360deg) rotateY(360deg) rotateZ(405deg);
    }
}

@keyframes cubeFloat{
    0%,100%{
        translate:0 0;
    }
    50%{
        translate:0 -15px;
    }
}

/* Right Section */

.right{
    flex:1;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h1{
    color:white;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:16px;
}

input::placeholder{
    color:#ddd;
}

button{
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        135deg,
        #7b2cff,
        #00c3ff
    );
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

/* Popup */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:350px;
    padding:25px;
    text-align:center;
    border-radius:20px;
    background:#101828;
    color:white;
    display:none;
    z-index:1000;
}

.popup button{
    margin-top:15px;
    width:100%;
}

.bubbles{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.bubbles span{
    position:absolute;
    bottom:-100px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(5px);

    animation:bubbleMove linear infinite;
}

.bubbles span:nth-child(1){
    left:10%;
    width:30px;
    height:30px;
    animation-duration:10s;
}

.bubbles span:nth-child(2){
    left:25%;
    width:60px;
    height:60px;
    animation-duration:13s;
}

.bubbles span:nth-child(3){
    left:40%;
    width:20px;
    height:20px;
    animation-duration:8s;
}

.bubbles span:nth-child(4){
    left:55%;
    width:50px;
    height:50px;
    animation-duration:15s;
}

.bubbles span:nth-child(5){
    left:70%;
    width:35px;
    height:35px;
    animation-duration:11s;
}

.bubbles span:nth-child(6){
    left:82%;
    width:70px;
    height:70px;
    animation-duration:16s;
}

.bubbles span:nth-child(7){
    left:92%;
    width:25px;
    height:25px;
    animation-duration:9s;
}

.bubbles span:nth-child(8){
    left:50%;
    width:45px;
    height:45px;
    animation-duration:12s;
}

@keyframes bubbleMove{
    0%{
        transform:translateY(0) scale(0.5);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(1.3);
        opacity:0;
    }
}

</style>
</head>

<body>
    

<div class="bg-cube"></div>
<div class="bg-cube"></div>
<div class="bg-cube"></div>
<div class="bg-cube"></div>

<div class="container">

    <div class="left">
        <div class="ladder">
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>
    </div>

  <div class="right">

    <div class="title-container">
        <h1 class="v2v-title">
            V2V <span>NEXUS</span>
        </h1>

        <p class="subtitle">
            Real-Time Emergency Vehicle Communication
        </p>
    </div>

    <div class="input-box">
            <input type="text" id="name" name="name" placeholder="Enter Name" required>
        </div>

        <div class="input-box">
            <input type="tel" placeholder="Phone Number">
        </div>

        <div class="input-box">
    <input
        type="text"
        id="vehicleNumber"
        placeholder="Vehicle Number"
        maxlength="12"
        oninput="this.value = this.value.toUpperCase()">
</div>

        <button onclick="registerVehicle()">
            Continue
        </button>
    </div>

</div>

<div class="popup" id="popup">
    <h2>📍 Location Access</h2>
    <p>
        Allow location access to enable
        Vehicle-to-Vehicle emergency communication
        and nearby vehicle detection.
    </p>

    <button onclick="requestLocation()">
        Allow Location
    </button>
</div>

<script>

function showPopup(){
    document.getElementById("popup").style.display="block";
}

function requestLocation(){

    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(
            () => alert("Location Access Granted"),
            () => alert("Location Access Denied")
        );
    }
}

async function registerVehicle() {

    const name = document.getElementById("name").value;

    const phone =
        document.querySelector('input[type="tel"]').value;

    const vehicleNumber =
        document.getElementById("vehicleNumber").value;

    navigator.geolocation.getCurrentPosition(

        async (position) => {

            const response = await fetch(
                "http://localhost:3000/register",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name,
                        phone,
                        vehicleNumber,
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude
                    })
                }
            );

            const data = await response.json();

            alert(data.message);

            if(data.success){

     localStorage.setItem("vehicleNumber", vehicleNumber);
localStorage.setItem("latitude", position.coords.latitude);
localStorage.setItem("longitude", position.coords.longitude);

    window.location.href =
    "main page.html";
}
        },

        () => {
            alert("Please allow location access.");
        }
    );
}

</script>
<div class="bubbles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>
</body>
</html>
